name: Daily AI Post Automation

on:
  schedule:
    - cron: '0 0 * * *' # 매일 한국 시간 오전 9시 (UTC 00:00)
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 파일 쓰기 권한 명시적 부여
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @google/generative-ai

      - name: Generate Daily Post
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: node scripts/generate-daily-post.mjs

      - name: Send Daily Promo Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[Money-Maker AI] 오늘의 홍보글 보고서 도착! 🚀"
          to: royalstatesi1@gmail.com
          from: AI Marketing Team
          body: file://src/data/promo.txt
          convert_markdown: true

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add src/data/product.json src/data/promo.txt
          git commit -m "Automated daily post and promo: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
